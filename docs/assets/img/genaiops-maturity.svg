<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Four-level GenAIOps maturity journey">
  <rect width="1200" height="360" fill="#f8fbff"/><text x="55" y="58" fill="#123a63" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700">Azure GenAIOps Maturity Journey</text>
  <g font-family="Segoe UI, sans-serif"><g stroke-width="3"><rect x="55" y="125" width="250" height="140" rx="10" fill="#edf5ff" stroke="#1f6feb"/><rect x="340" y="125" width="250" height="140" rx="10" fill="#eff9f8" stroke="#087f73"/><rect x="625" y="125" width="250" height="140" rx="10" fill="#fff9ed" stroke="#b7791f"/><rect x="910" y="125" width="235" height="140" rx="10" fill="#f5f0fc" stroke="#7048b8"/></g><g fill="#243447"><text x="80" y="165" font-size="22" font-weight="700">Level 1: Initial</text><text x="80" y="200" font-size="16">Explore models, prompts,</text><text x="80" y="225" font-size="16">and basic telemetry.</text><text x="365" y="165" font-size="22" font-weight="700">Level 2: Defined</text><text x="365" y="200" font-size="16">Versioned app delivery,</text><text x="365" y="225" font-size="16">tests and environments.</text><text x="650" y="165" font-size="22" font-weight="700">Level 3: Managed</text><text x="650" y="200" font-size="16">Evaluation, monitoring,</text><text x="650" y="225" font-size="16">policy and runbooks.</text><text x="935" y="165" font-size="22" font-weight="700">Level 4: Optimized</text><text x="935" y="200" font-size="16">Progressive delivery and</text><text x="935" y="225" font-size="16">continuous improvement.</text></g></g>
  <g stroke="#5b7083" stroke-width="3" fill="none"><path d="M305 195h30m255 0h30m255 0h30"/></g><g fill="#5b7083"><path d="m325 189 12 6-12 6zm285 0 12 6-12 6zm285 0 12 6-12 6z"/></g>
</svg>