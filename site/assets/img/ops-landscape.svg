<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Azure AI operations landscape</title><desc id="desc">MLOps and GenAIOps sit on shared delivery, governance, security and FinOps foundations.</desc>
  <rect width="1200" height="460" fill="#f8fbff"/><text x="60" y="65" fill="#123a63" font-family="Segoe UI, sans-serif" font-size="32" font-weight="700">Azure AI Operations</text><text x="60" y="100" fill="#526072" font-family="Segoe UI, sans-serif" font-size="18">Two operating disciplines, one evidence-driven enterprise foundation</text>
  <rect x="60" y="145" width="500" height="180" rx="10" fill="#edf5ff" stroke="#1f6feb" stroke-width="3"/><text x="95" y="195" fill="#123a63" font-family="Segoe UI, sans-serif" font-size="26" font-weight="700">MLOps</text><text x="95" y="230" fill="#315d63" font-family="Segoe UI, sans-serif" font-size="18">Data · Features · Training · Models</text><text x="95" y="260" fill="#315d63" font-family="Segoe UI, sans-serif" font-size="18">Evaluation · Endpoints · Drift</text><text x="95" y="290" fill="#315d63" font-family="Segoe UI, sans-serif" font-size="18">Retraining · Champion/Challenger</text>
  <rect x="640" y="145" width="500" height="180" rx="10" fill="#f5f0fc" stroke="#7048b8" stroke-width="3"/><text x="675" y="195" fill="#593b87" font-family="Segoe UI, sans-serif" font-size="26" font-weight="700">GenAIOps</text><text x="675" y="230" fill="#593b87" font-family="Segoe UI, sans-serif" font-size="18">Prompts · Models · Retrieval · Tools</text><text x="675" y="260" fill="#593b87" font-family="Segoe UI, sans-serif" font-size="18">Grounding · Safety · Task quality</text><text x="675" y="290" fill="#593b87" font-family="Segoe UI, sans-serif" font-size="18">Feedback · Progressive delivery</text>
  <rect x="60" y="360" width="1080" height="60" rx="8" fill="#e9f3f3" stroke="#087f73" stroke-width="2"/><text x="600" y="398" fill="#174c4a" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700">Shared foundation: Identity · Security · CI/CD · Observability · Governance · FinOps</text>
</svg>